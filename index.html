<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Music streaming and AI-powered music generation platform" />

  <!-- Preconnect to external domains for faster resource loading -->
  <link rel="preconnect" href="https://api.brokencarrot.my" crossorigin />
  <link rel="preconnect" href="https://music-streaming-audio.s3.ap-northeast-2.amazonaws.com" crossorigin />

  <!-- DNS Prefetch for images -->
  <link rel="dns-prefetch" href="https://is1-ssl.mzstatic.com" />

  <!-- Preload critical resources -->
  <link rel="modulepreload" href="/src/main.tsx" />

  <title>Music Platform</title>

  <!-- Critical CSS for FCP - 즉시 표시되는 로딩 화면 스타일 -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      height: 100%;
    }

    body {
      background: #1d1d1d;
      color: #f6f6f6;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* 로딩 화면 스타일 */
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1d1d1d;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    #app-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(175, 222, 226, 0.2);
      border-top-color: #AFDEE2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- 로딩 화면 - JS 로드 전 즉시 표시 (FCP 개선) -->
  <div id="app-loader">
    <div class="loader-spinner"></div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- 앱 로드 완료 후 로딩 화면 제거 -->
  <script>
    window.addEventListener('load', function () {
      var loader = document.getElementById('app-loader');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function () { loader.remove(); }, 300);
      }
    });
  </script>
</body>

</html>
